<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <title>Aula Session Sync — Opsætning</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; width: 320px; padding: 20px; background: #1a1a2e; color: #eee; }
    h1 { color: #e94560; font-size: 1.1rem; margin-bottom: 12px; }
    p { color: #aaa; font-size: 0.82rem; margin-bottom: 12px; line-height: 1.5; }
    input {
      width: 100%;
      background: #0f3460;
      border: none;
      border-radius: 6px;
      color: #eee;
      padding: 8px 10px;
      font-size: 0.85rem;
      margin-bottom: 10px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 9px;
      font-size: 0.9rem;
      cursor: pointer;
    }
    #msg { font-size: 0.8rem; color: #2ecc71; margin-top: 8px; min-height: 18px; }
  </style>
</head>
<body>
  <h1>🔌 Aula Session Sync</h1>
  <p>Indtast din dashboard API-nøgle for at aktivere automatisk session-synkronisering.</p>
  <input id="api-key" type="password" placeholder="API Key" />
  <button onclick="save()">Gem</button>
  <div id="msg"></div>

  <script>
    // Load existing key
    chrome.storage.local.get("apiKey", ({ apiKey }) => {
      if (apiKey) document.getElementById("api-key").value = apiKey;
    });

    function save() {
      const key = document.getElementById("api-key").value.trim();
      if (!key) { document.getElementById("msg").textContent = "Indtast en API-nøgle."; return; }
      chrome.storage.local.set({ apiKey: key }, () => {
        document.getElementById("msg").textContent = "✅ Gemt!";
      });
    }
  </script>
</body>
</html>
